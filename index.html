<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>The Last Wolf</title><meta name="description" content="The Last Wolf AR Experience"><meta name="theme-color" content="#000000"><script crossorigin="anonymous" src="./external/runtime/runtime.js"></script><script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;}
#xr-canvas{position:fixed;inset:0;}
#loadingScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:9999;transition:opacity .35s;}
#loadingScreen.hide{opacity:0;pointer-events:none;}
.loader{width:42px;height:42px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}</style></head><body><div id="loadingScreen"><div class="loader"></div></div><canvas id="xr-canvas"></canvas><script src="bundle.js"></script><script>window.addEventListener("load",()=>{
 const loading=document.getElementById("loadingScreen");
 const hide=()=>{loading.classList.add("hide");setTimeout(()=>loading.remove(),400);};
 if(window.XR8){requestAnimationFrame(hide);}
 else{window.addEventListener("xrloaded",()=>requestAnimationFrame(hide),{once:true});}
});</script></body></html>
