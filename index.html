<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>The Last Wolf</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>
  <script src="https://unpkg.com/aframe-chromakey-material@1.1.4/dist/aframe-chromakey-material.min.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="./engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "wolf_target",
          "type": "PLANAR",
          "imagePath": "./assets/Targets/wolf_target.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 421, "height": 650,
            "originalWidth": 421, "originalHeight": 650,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <!-- Preload image asset -->
    <a-assets>
      
      <video
        id="mainVideo"

        src="./assets/Wolf.mp4"

        preload="none"

        playsinline
        webkit-playsinline

        crossorigin="anonymous"
>
      </video>

    </a-assets>

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="wolf_target">
      
      <a-video

        id="main_video"

        src="#mainVideo"

        width="1"
        height="0.647"

        position="0 0 0"

        visible="false">
      </a-video>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
