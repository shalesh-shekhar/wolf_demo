<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Boily Spud WebAR</title>
  <meta itemprop="name" content="Boily Spud WebAR Book">
  <meta name="twitter:title" content="Boily Spud WebAR Book">
  <meta property="og:title" content="Boily Spud WebAR Book">
  <meta property="og:site_name" content="Boily Spud WebAR Book">
  <meta name="description" content="AR book cover with animated character">
  <meta itemprop="description" content="AR book cover with animated character">
  <meta property="og:description"
    content="AR book cover with animated character">
  <meta name="twitter:description"
    content="AR book cover with animated character">
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
  <link rel="manifest" href="./assets/site.webmanifest">
  <meta name="theme-color" content="#D89A5B">
  <script crossorigin="anonymous" src="./external/runtime/runtime.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous"
    data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js"
    crossorigin="anonymous"></script>
  <meta property="og:image" content="./assets/preview.png">
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: url('./assets/BoilySpudTarget.jpg') center center / cover no-repeat;
      display: flex;
      justify-content: center;
      transition: opacity 0.45s ease;
    }

    #start-button {
      position: absolute;
      bottom: 50px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      pointer-events: none;
      opacity: 0.5;
      transition: transform 0.2s ease, opacity 0.4s ease;
    }

    #start-button img {
      display: block;
      width: min(70vw, 280px);
      height: auto;
    }

    #start-button.active {
      pointer-events: auto;
      opacity: 1;
    }

    #start-button:active {
      transform: scale(0.95);
    }

    #xr-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>
  <script src="bundle.js"></script>
  <div id="start-overlay">
    <button id="start-button"><img src="./assets/StartAR.png" alt="Start AR"></button>
  </div>
  <canvas id="xr-canvas"></canvas>

  <script>
    window.addEventListener("load", () => {
      const button = document.getElementById("start-button");

      const activateButton = () => {
        button.classList.add("active");
      };

      // Enable the button as soon as 8th Wall finishes initializing
      if (window.XR8) {
        activateButton();
      } else {
        window.addEventListener("xrloaded", activateButton);
      }

      button.onclick = async () => {
        if (!button.classList.contains("active")) return;

        // Unlock audio context so sounds can play natively on click
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          if (ctx.state === 'suspended') await ctx.resume();
        } catch (e) {}

        // Hide and remove the visual overlay layer
        const overlay = document.getElementById("start-overlay");
        overlay.style.opacity = 0;
        setTimeout(() => overlay.remove(), 450);
      };
    });
  </script>
</body>

</html>
